  const [inView, setInView] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        setInView(true);
        observer.unobserve(el);
      }
    }, options);
    observer.observe(el);
    return () => observer.disconnect();
  }, []);
  return [ref, inView];
};

const FadeIn = ({ children, delay = 0, className = '' }) => {
  const [ref, inView] = useInView();
  return (
    <div
      ref={ref}
      className={`transition-all duration-1000 ease-out ${inView ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'} ${className}`}
      style={{ transitionDelay: `${delay}ms` }}
    >
      {children}
    </div>
  );
};

const CountUp = ({ end, duration = 2000, suffix = '' }) => {
  const [count, setCount] = useState(0);
  const [ref, inView] = useInView();
  useEffect(() => {
    if (!inView) return;
    let start = 0;
    const increment = end / (duration / 16);
    const timer = setInterval(() => {
      start += increment;
      if (start >= end) { setCount(end); clearInterval(timer); }
      else setCount(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [inView, end, duration]);
  return <span ref={ref}>{count.toLocaleString()}{suffix}</span>;
};

// ───────────────────────────────────────────────────────────────────
// Before/After 드래그 슬라이더
// ───────────────────────────────────────────────────────────────────
const BeforeAfterSlider = ({ beforeSrc, afterSrc, label, partLabel }) => {
  const [position, setPosition] = useState(50);
  const [isDragging, setIsDragging] = useState(false);
  const containerRef = useRef(null);

  const handleMove = useCallback((clientX) => {
    if (!containerRef.current) return;
    const rect = containerRef.current.getBoundingClientRect();
    const x = clientX - rect.left;
    setPosition(Math.max(0, Math.min(100, (x / rect.width) * 100)));
  }, []);

  useEffect(() => {
    const handleMouseMove = (e) => isDragging && handleMove(e.clientX);
    const handleTouchMove = (e) => isDragging && handleMove(e.touches[0].clientX);
    const handleEnd = () => setIsDragging(false);
    window.addEventListener('mousemove', handleMouseMove);
    window.addEventListener('mouseup', handleEnd);
    window.addEventListener('touchmove', handleTouchMove);
    window.addEventListener('touchend', handleEnd);
    return () => {
      window.removeEventListener('mousemove', handleMouseMove);
      window.removeEventListener('mouseup', handleEnd);
      window.removeEventListener('touchmove', handleTouchMove);
      window.removeEventListener('touchend', handleEnd);
    };
  }, [isDragging, handleMove]);

  return (
    <div className="group">
      <div
        ref={containerRef}
        className="relative aspect-[4/3] overflow-hidden rounded-2xl bg-stone-200 cursor-ew-resize select-none shadow-xl ring-1 ring-stone-200"
        onMouseDown={(e) => { setIsDragging(true); handleMove(e.clientX); }}
        onTouchStart={(e) => { setIsDragging(true); handleMove(e.touches[0].clientX); }}
      >
        <div className="absolute inset-0">
          {afterSrc ? (
            <img src={afterSrc} alt="After" className="w-full h-full object-cover" draggable={false} />
          ) : (
            <div className="w-full h-full bg-gradient-to-br from-stone-50 to-amber-50 flex items-center justify-center">
              <div className="text-center">
                <Sparkles className="w-16 h-16 text-amber-600 mx-auto mb-2" />
                <p className="text-amber-800 font-bold text-lg" style={{ fontFamily: '"Cormorant Garamond", serif' }}>AFTER</p>
                <p className="text-amber-700 text-sm">청소 후</p>
              </div>
            </div>
          )}
        </div>
        <div className="absolute inset-0" style={{ clipPath: `inset(0 ${100 - position}% 0 0)` }}>
          {beforeSrc ? (
            <img src={beforeSrc} alt="Before" className="w-full h-full object-cover" draggable={false} />
          ) : (
            <div className="w-full h-full bg-gradient-to-br from-stone-700 to-stone-900 flex items-center justify-center">
              <div className="text-center">
                <Wind className="w-16 h-16 text-stone-400 mx-auto mb-2" />
                <p className="text-stone-200 font-bold text-lg" style={{ fontFamily: '"Cormorant Garamond", serif' }}>BEFORE</p>
                <p className="text-stone-400 text-sm">청소 전</p>
              </div>
            </div>
          )}
        </div>
        <div className="absolute top-4 left-4 px-3 py-1.5 bg-black/80 backdrop-blur text-white text-xs font-bold rounded-full tracking-wider">BEFORE</div>
        <div className="absolute top-4 right-4 px-3 py-1.5 bg-amber-600/95 backdrop-blur text-white text-xs font-bold rounded-full tracking-wider">AFTER</div>
        <div className="absolute top-0 bottom-0 w-0.5 bg-white shadow-[0_0_20px_rgba(0,0,0,0.5)]" style={{ left: `${position}%` }}>
          <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-12 h-12 bg-white rounded-full shadow-2xl flex items-center justify-center ring-4 ring-amber-500/20 group-hover:scale-110 transition-transform">
            <div className="flex items-center gap-0.5">
              <ChevronRight className="w-3 h-3 text-stone-700 -rotate-180" />
              <ChevronRight className="w-3 h-3 text-stone-700" />
            </div>
          </div>
        </div>
        {partLabel && (
          <div className="absolute bottom-4 left-4 right-4 px-4 py-2 bg-white/95 backdrop-blur rounded-lg shadow-lg">
            <p className="text-xs text-stone-600 font-medium">{partLabel}</p>
          </div>
        )}
      </div>
      <div className="mt-3 px-1">
        <p className="text-sm text-stone-600">
          <span className="text-amber-700 font-bold">←→</span> 슬라이더를 좌우로 움직여 비교해보세요
        </p>
        {label && <p className="text-xs text-stone-400 mt-0.5">{label}</p>}
      </div>
    </div>
  );
};

const QuickEstimator = () => {
  const products = [
    { id: 'wall', name: '벽걸이형', price: 70000, icon: '🌬️' },
    { id: 'stand', name: '스탠드형', price: 120000, icon: '❄️' },
    { id: 'twoinone', name: '2in1 (벽+스탠드)', price: 180000, icon: '🌀' },
    { id: 'ceiling', name: '천장형 (1way/4way)', price: 130000, icon: '⬛' },
  ];

  const [selected, setSelected] = useState({});
  const total = Object.entries(selected).reduce((sum, [id, qty]) => {
    const product = products.find((p) => p.id === id);
    return sum + (product ? product.price * qty : 0);
  }, 0);
  const discount = total > 0 ? 5000 : 0;
  const finalTotal = total - discount;

  const updateQty = (id, delta) => {
    setSelected((prev) => {
      const current = prev[id] || 0;
      const next = Math.max(0, Math.min(10, current + delta));
      const updated = { ...prev };
      if (next === 0) delete updated[id];
      else updated[id] = next;
      return updated;
    });
  };

  return (
    <div className="bg-white rounded-3xl p-6 sm:p-8 shadow-2xl ring-1 ring-stone-200">
      <div className="flex items-center gap-3 mb-6 pb-5 border-b border-stone-200">
        <div className="w-10 h-10 bg-amber-50 rounded-xl flex items-center justify-center ring-1 ring-amber-200">
          <Sparkles className="w-5 h-5 text-amber-700" />
        </div>
        <div>
          <h3 className="text-xl font-black text-black" style={{ fontFamily: '"Cormorant Garamond", serif' }}>Instant Quote</h3>
          <p className="text-xs text-stone-500">3초 만에 가격 확인 · 추가 비용 없음</p>
        </div>
      </div>

      <div className="space-y-3">
        {products.map((p) => {
          const qty = selected[p.id] || 0;
          return (
            <div
              key={p.id}
              className={`flex items-center justify-between p-4 rounded-2xl transition-all ${
                qty > 0 ? 'bg-amber-50 ring-2 ring-amber-300' : 'bg-stone-50 hover:bg-stone-100'
              }`}
            >
              <div className="flex items-center gap-3">
                <span className="text-2xl">{p.icon}</span>
                <div>
                  <p className="font-bold text-black text-sm sm:text-base">{p.name}</p>
                  <p className="text-xs text-stone-500">대당 {p.price.toLocaleString()}원~</p>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <button
                  onClick={() => updateQty(p.id, -1)}
                  disabled={qty === 0}
                  className="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center hover:bg-stone-50 disabled:opacity-40 disabled:cursor-not-allowed transition"
                >
                  <Minus className="w-4 h-4 text-stone-700" />
                </button>
                <span className="w-6 text-center font-bold text-black">{qty}</span>
                <button
                  onClick={() => updateQty(p.id, 1)}
                  className="w-8 h-8 rounded-full bg-amber-600 shadow-sm flex items-center justify-center hover:bg-amber-700 transition"
                >
                  <Plus className="w-4 h-4 text-white" />
                </button>
              </div>
            </div>
          );
        })}
      </div>

      <div className="mt-6 pt-6 border-t border-dashed border-stone-300">
        {total > 0 && (
          <div className="mb-4 space-y-1.5">
            <div className="flex justify-between text-sm text-stone-500">
              <span>견적 금액</span>
              <span>{total.toLocaleString()}원</span>
            </div>
            <div className="flex justify-between text-sm">
              <span className="flex items-center gap-1 text-rose-600 font-bold">
                <Gift className="w-3.5 h-3.5" />
                첫 이용 할인
              </span>
              <span className="text-rose-600 font-bold">-{discount.toLocaleString()}원</span>
            </div>
          </div>
        )}
        <div className="flex items-end justify-between mb-4">
          <span className="text-sm text-stone-600">최종 결제 금액</span>
          <div className="text-right">
            <p className="text-3xl font-black text-black">
              {finalTotal.toLocaleString()}<span className="text-lg font-bold text-stone-500">원</span>
            </p>
            {total > 0 && <p className="text-xs text-amber-700 font-medium mt-1">현장 추가금 0원 보장</p>}
          </div>
        </div>
        <button
          disabled={total === 0}
          onClick={handleReserve}
          className="w-full py-4 bg-black text-white font-bold rounded-2xl shadow-lg shadow-black/20 hover:bg-stone-800 hover:-translate-y-0.5 active:translate-y-0 transition-all disabled:opacity-40 disabled:cursor-not-allowed disabled:transform-none disabled:shadow-none flex items-center justify-center gap-2 tracking-wide"
        >
          {total === 0 ? '에어컨을 선택해주세요' : '예약하기'}
          {total > 0 && <ArrowRight className="w-5 h-5" />}
        </button>
      </div>
    </div>
  );
};
